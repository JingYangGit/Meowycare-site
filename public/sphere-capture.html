<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { 
    background: #0f0a1a; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    width: 100vw; 
    height: 100vh; 
    overflow: hidden;
    position: relative;
  }
  .outer-glow {
    position: absolute;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: rgba(147, 51, 234, 0.2);
    mix-blend-mode: screen;
    filter: blur(48px);
    opacity: 0.5;
  }
  .secondary-glow {
    position: absolute;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: rgba(79, 70, 229, 0.2);
    mix-blend-mode: screen;
    filter: blur(48px);
    opacity: 0.5;
  }
  .sphere {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: linear-gradient(to bottom right, #d8b4fe, #fbcfe8, #a5b4fc);
    box-shadow: 0 0 60px rgba(232, 180, 255, 0.6);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="outer-glow"></div>
  <div class="secondary-glow"></div>
  <div class="sphere"></div>
</body>
</html>
